name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install GTK runtime (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev libcairo2

      - name: Install package (+ dev tools)
        run: python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: python -m ruff check honbicka tests

      - name: Pytest (rychlé testy, bez @slow / bez Ollamy)
        run: python -m pytest -m "not slow" -q
